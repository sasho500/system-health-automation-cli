name: Python Healthcheck CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests
        run: |
          python -m pytest

      - name: Check CLI help
        run: |
          python -m healthCheck.cli --help

      - name: Run local health check
        run: |
          python -m healthCheck.cli local || true

      - name: Run JSON export
        run: |
          python -m healthCheck.cli local --format json || true

      - name: Run CSV export
        run: |
          python -m healthCheck.cli local --format csv || true

      - name: Run port check
        run: |
          python -m healthCheck.cli ports --ports 22,80,443 || true

      - name: Run service check
        run: |
          python -m healthCheck.cli services --names python || true